# Render Blueprint — deploy with "New +" -> "Blueprint" pointed at this repo.
# GROQ_API_KEY is marked sync:false: set its value in the Render dashboard, never here.
services:
  - type: web
    name: jpdoc-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    # "free" (512MB) by deliberate choice — LOW_MEMORY_MODE below forwards
    # scanned/image uploads to the paired HF Space (HF_SPACE_URL) instead of
    # processing them here (measured ~120-165MB for digital-PDF processing,
    # see JCT_Backend_v1 memory testing). Bump to "standard" (2GB+) and flip
    # LOW_MEMORY_MODE to "false" if you'd rather Render handle everything itself.
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FALLBACK_MODEL
        value: llama-3.1-8b-instant
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: GEMINI_MAX_REQUESTS_PER_MINUTE
        value: "15"
      - key: JCT_LLM_PROVIDER
        value: groq
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: DEV_MODE
        value: "false"
      - key: LOW_MEMORY_MODE
        value: "true"
      - key: DEPLOYMENT_NAME
        value: render
      - key: HF_SPACE_URL
        value: https://samuelkottala096-japanese-contract-translator-backend.hf.space
      - key: EXT_CLNT_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://jctai.netlify.app,http://localhost:5173
      - key: MAX_UPLOAD_MB
        value: "25"
      - key: LOG_LEVEL
        value: INFO
